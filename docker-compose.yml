services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: accounting_bot
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpassword
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"          # solo expuesto localmente, en producción quitar
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devuser -d accounting_bot"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy  # espera que Postgres esté listo
    volumes: 
      - ./api:/app
    environment:
      DATABASE_URL: postgresql://devuser:devpassword@db:5432/accounting_bot
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_WHATSAPP_NUMBER: ${TWILIO_WHATSAPP_NUMBER}
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      DEBUG: ${DEBUG:-false}
    ports:
      - "8000:8000"
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata: